function relBuckets2(periodo){
  var now=new Date(),keys=[],labels=[],i,d;
  if(periodo==='dia'){for(i=13;i>=0;i--){d=new Date(now);d.setDate(now.getDate()-i);keys.push('D'+ymd(d));labels.push(('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2));}}
  else if(periodo==='semana'){var ws=weekStart(now);for(i=7;i>=0;i--){d=new Date(ws);d.setDate(ws.getDate()-i*7);keys.push('W'+ymd(d));labels.push(('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2));}}
  else if(periodo==='mes'){var mn=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];for(i=11;i>=0;i--){d=new Date(now.getFullYear(),now.getMonth()-i,1);keys.push('M'+d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2));labels.push(mn[d.getMonth()]);}}
  else{for(i=4;i>=0;i--){var y=now.getFullYear()-i;keys.push('Y'+y);labels.push(''+y);}}
  function keyOf(dt){ if(periodo==='dia')return 'D'+ymd(dt); if(periodo==='semana')return 'W'+ymd(weekStart(dt)); if(periodo==='mes')return 'M'+dt.getFullYear()+'-'+('0'+(dt.getMonth()+1)).slice(-2); return 'Y'+dt.getFullYear(); }
  var abertos=keys.map(function(){return 0;}), tratados=keys.map(function(){return 0;});
  (RELATOS||[]).forEach(function(r){
    var dt=new Date(r.criado_em),idx=keys.indexOf(keyOf(dt)); if(idx<0)return;
    if(r.status==='tratado')tratados[idx]++; else abertos[idx]++;
  });
  return {labels:labels,abertos:abertos,tratados:tratados};
}
function relBarChart2(b){

      +'<div title="Tratados: '+b.tratados[i]+'" style="width:100%;background:var(--g2);height:'+hT+'%"></div>'
      +'</div>'

  }).join('');
  return '<div style="display:flex;align-items:flex-end;gap:4px;height:120px;padding:6px 0">'+barras+'</div>'

function salvarTratativa(id){

  if(!SB||!navigator.onLine){toast('Precisa de internet para salvar','e');return;}
  SB.from('cs18_relatos').update({status:'tratado',gravidade:grav||null,tratativa:trat,tratado_por:(USER&&USER.nome)||'',tratado_em:new Date().toISOString()}).eq('id',id).then(function(r){

// ---------- QR DO CANAL ----------
function ensureQR(cb){
  if(window.QRCode){cb();return;}
  var sc=document.createElement('script');
  sc.src='https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
  sc.onload=function(){window.QRCode?cb():toast('Falha ao carregar QR','e');};
  sc.onerror=function(){toast('Sem internet para gerar o QR','e');};
  document.head.appendChild(sc);
}
function relatoURL(obra,local){
  var base=location.origin+location.pathname;
  var q='?relato=1';
  if(obra)q+='&obra='+encodeURIComponent(obra);
  if(local)q+='&local='+encodeURIComponent(local);
  return base+q;
}
function abrirQR(){
  var html='<div class="sig-ov" id="qrOv"><div class="sig-box" style="max-width:420px">'
    +'<div class="sig-tt">QR Code do canal de relatos</div>'
    +'<div class="sig-sub">Cole na obra. Quem escanear abre o relato anônimo.</div>'
    +'<div class="iw" style="text-align:left"><label>Obra (opcional)</label><input class="inp" id="qrObra" placeholder="Nome da obra"></div>'
    +'<div class="iw" style="text-align:left"><label>Local / Área (opcional)</label><input class="inp" id="qrLocal" placeholder="Ex: Bloco B"></div>'
    +'<div id="qrBox" style="display:flex;justify-content:center;padding:10px 0"></div>'
    +'<div id="qrLink" style="font-size:10px;color:var(--tx3);word-break:break-all;text-align:center;margin-bottom:8px"></div>'
    +'<div class="sig-btns"><button class="btn btn-o" onclick="fecharQR()">Fechar</button><button class="btn btn-o" onclick="gerarQR()">Gerar</button><button class="btn btn-g" style="flex:1" id="qrDlBtn" onclick="baixarQR()" disabled>⬇️ Baixar PNG</button></div>'
    +'</div></div>';
  var d=document.createElement('div');d.innerHTML=html;document.body.appendChild(d.firstChild);
  ensureQR(function(){gerarQR();});
}
function fecharQR(){var o=document.getElementById('qrOv');if(o)o.remove();}
function gerarQR(){
  if(!window.QRCode){ensureQR(gerarQR);return;}
  var obra=(document.getElementById('qrObra')||{}).value||'';
  var local=(document.getElementById('qrLocal')||{}).value||'';
  var url=relatoURL(obra.trim(),local.trim());
  var box=document.getElementById('qrBox');box.innerHTML='';
  new window.QRCode(box,{text:url,width:200,height:200,correctLevel:window.QRCode.CorrectLevel.M});
  document.getElementById('qrLink').textContent=url;
  var btn=document.getElementById('qrDlBtn');if(btn)btn.disabled=false;
}
function baixarQR(){
  var box=document.getElementById('qrBox');if(!box)return;
  var cv=box.querySelector('canvas');var url=cv?cv.toDataURL('image/png'):(box.querySelector('img')||{}).src;
  if(!url){toast('Gere o QR primeiro','e');return;}
  var a=document.createElement('a');a.href=url;a.download='QR-relato-seguranca.png';document.body.appendChild(a);a.click();a.remove();
}

function rsAtrasada(n){if(n.status!=='corrigida'||!n.prazo||!n.data_resolucao)return false;return (''+n.data_resolucao).slice(0,10)>n.prazo;}

function rsNivelDesc(k){var m={baixo:'menor gravidade, corrigir na rotina',medio:'requer atenção, corrigir em breve',grave:'risco sério, corrigir com urgência',iminente:'risco à vida, interromper a atividade imediatamente'};return m[k]||'';}
function hexToRgb(h){h=(''+(h||'#000000')).replace('#','');if(h.length===3)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];var n=parseInt(h,16)||0;return [(n>>16)&255,(n>>8)&255,n&255];}

// ---- score e métricas (conforme combinado) ----
function rsScore(ncs){
  var s=100;
  ncs.forEach(function(n){
    var ef=statusEf(n);
    if(ef!=='corrigida') s-=rsNivel(n.nivel_risco).p;   // pendência por gravidade
    if(rsAtrasada(n)) s-=5;                              // corrigida fora do prazo
    if(ef==='vencida') s-=8;                             // vencida (aberta além do prazo)
    if(n.reincidencia) s-=6;                             // reincidência
  });
  return Math.max(0,Math.round(s));
}
function rsMetrics(ncs){
  var total=ncs.length,corr=0,corrPrazo=0,reinc=0,graves=0,abertas=0,vencidas=0;
  ncs.forEach(function(n){
    var ef=statusEf(n);
    if(n.status==='corrigida'){corr++;if(!rsAtrasada(n))corrPrazo++;}
    if(ef==='vencida')vencidas++;
    if(ef==='aberta'||ef==='em_correcao')abertas++;
    if(n.reincidencia)reinc++;
    if(n.nivel_risco==='grave'||n.nivel_risco==='iminente')graves++;
  });
  return {total:total,corrigidas:corr,corrPrazo:corrPrazo,pctPrazo:total?Math.round(corrPrazo/total*100):0,reinc:reinc,graves:graves,abertas:abertas,vencidas:vencidas};
}
function rsNCsPeriodo(mes){
  var arr=(DB.rs_nc||[]).slice();
  if(mes)arr=arr.filter(function(n){return (''+(n.data_registro||'')).slice(0,7)===mes;});
  return arr;
}
function rsRanking(mes){
  var ncs=rsNCsPeriodo(mes),by={};
  ncs.forEach(function(n){
    var k=ncEmpresa(n)||'—';
    if(!by[k])by[k]={emp:{id:k,nome:k},ncs:[]};
    by[k].ncs.push(n);
  });
  var arr=Object.keys(by).map(function(k){var o=by[k];return {emp:o.emp,ncs:o.ncs,score:rsScore(o.ncs),m:rsMetrics(o.ncs)};});
  arr.sort(function(a,b){return a.score-b.score || b.m.graves-a.m.graves || b.m.total-a.m.total;});
  return arr;
}

// ---- empresa por TEXTO (sem cadastro); legado resolve nome da empreiteira ----
function ncEmpresa(n){
  if(!n)return '—';
  if(n.empresa&&(''+n.empresa).trim())return (''+n.empresa).trim();

}
// empresas já usadas (sugestões do datalist) — NCs, relatos e cadastros legados
function rsEmpresasUsadas(){

// todas as NCs como "eventos" (NCs avulsas + itens de relatos) p/ gráficos
function rsAllNCs(){

    });

  return arr.filter(function(e){return e.data;});

// série temporal: modo 'dia' (14d), 'semana' (8sem), 'mes' (6m)
function rsSerie(modo){
  var all=rsAllNCs(), now=new Date(), buckets=[];
  function z(n){return ('0'+n).slice(-2);}
  function ymd(d){return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate());}
  if(modo==='dia'){
    for(var i=13;i>=0;i--){var d=new Date(now);d.setDate(now.getDate()-i);buckets.push({key:ymd(d),lb:z(d.getDate())+'/'+z(d.getMonth()+1),n:0});}
    all.forEach(function(e){var b=buckets.find(function(x){return x.key===e.data;});if(b)b.n++;});
  } else if(modo==='semana'){
    function wkStart(d){var x=new Date(d);var dow=(x.getDay()+6)%7;x.setDate(x.getDate()-dow);x.setHours(0,0,0,0);return x;}
    for(var j=7;j>=0;j--){var ws=wkStart(now);ws.setDate(ws.getDate()-j*7);buckets.push({key:ymd(ws),lb:z(ws.getDate())+'/'+z(ws.getMonth()+1),n:0});}
    all.forEach(function(e){var dt=new Date(e.data+'T00:00:00');if(isNaN(dt))return;var k=ymd(wkStart(dt));var b=buckets.find(function(x){return x.key===k;});if(b)b.n++;});
  } else {
    var meses=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
    for(var m=5;m>=0;m--){var d2=new Date(now.getFullYear(),now.getMonth()-m,1);buckets.push({key:d2.getFullYear()+'-'+z(d2.getMonth()+1),lb:meses[d2.getMonth()]+'/'+String(d2.getFullYear()).slice(2),n:0});}
    all.forEach(function(e){var k=(''+e.data).slice(0,7);var b=buckets.find(function(x){return x.key===k;});if(b)b.n++;});
  }
  return buckets;
}
function rsSetSerie(m){RS_SERIE=m;render();}
function rsSerieBars(){
  var bs=rsSerie(RS_SERIE), max=Math.max.apply(null,bs.map(function(b){return b.n;}).concat([1]));
  return bs.map(function(b){
    return '<div class="bar-row"><div class="bar-lb">'+b.lb+'</div><div class="bar-tk"><div class="bar-fill" style="width:'+Math.round(b.n/max*100)+'%;background:var(--gg)"></div></div><div class="bar-vl">'+b.n+'</div></div>';
  }).join('');
}
// adiciona imagem no PDF preservando proporção (foto em pé não distorce)
function rsAddFotoFit(doc,data,x,y,bw,bh){
  try{
    var pr=doc.getImageProperties(data), iw=pr.width, ih=pr.height;
    if(!iw||!ih){doc.addImage(data,'JPEG',x,y,bw,bh);return true;}
    var r=Math.min(bw/iw,bh/ih), w=iw*r, h=ih*r, ox=x+(bw-w)/2, oy=y+(bh-h)/2;
    doc.addImage(data,'JPEG',ox,oy,w,h);
    return true;
  }catch(e){ try{doc.addImage(data,'JPEG',x,y,bw,bh);return true;}catch(e2){return false;} }
}


// ---- mapeamento DB <-> local ----
function rsEmpRow(e){return {id:e.id,nome:e.nome,cnpj:e.cnpj||null,responsavel:e.responsavel||null,contato:e.contato||null,area:e.area||null,obra:e.obra||null,ativa:e.ativa!==false,created_by:e.created_by||(USER&&USER.id)||null};}
function rsNcRow(n){return {id:n.id,codigo:n.codigo||null,empreiteira_id:n.empreiteira_id||null,nr:n.nr||null,descricao:n.descricao||null,nivel_risco:n.nivel_risco||'medio',local:n.local||null,obra:n.obra||null,foto_antes:n.foto_antes||null,foto_depois:n.foto_depois||null,fotos:(n.fotos&&n.fotos.length)?n.fotos:((n.foto_antes)?[n.foto_antes]:[]),fotos_depois:(n.fotos_depois&&n.fotos_depois.length)?n.fotos_depois:((n.foto_depois)?[n.foto_depois]:[]),prazo:n.prazo||null,responsavel_correcao:n.responsavel_correcao||null,status:n.status||'aberta',reincidencia:!!n.reincidencia,data_registro:n.data_registro||new Date().toISOString(),data_resolucao:n.data_resolucao||null,fiscal_id:n.fiscal_id||(USER&&USER.id)||null};}
function rsEmpFromDB(r){return {id:r.id,nome:r.nome,cnpj:r.cnpj,responsavel:r.responsavel,contato:r.contato,area:r.area,obra:r.obra,ativa:r.ativa,created_by:r.created_by,atualizadoEm:Date.parse(r.atualizado_em||r.criado_em||0)||Date.now(),_new:false};}
function rsNcFromDB(r){return {id:r.id,codigo:r.codigo,empreiteira_id:r.empreiteira_id,nr:r.nr,descricao:r.descricao,nivel_risco:r.nivel_risco,local:r.local,obra:r.obra,prazo:r.prazo,responsavel_correcao:r.responsavel_correcao,status:r.status,reincidencia:r.reincidencia,data_registro:r.data_registro,data_resolucao:r.data_resolucao,fiscal_id:r.fiscal_id,atualizadoEm:Date.parse(r.atualizado_em||r.data_registro||0)||Date.now(),_new:false};}
function rondaMerge(key,remoteArr){
  var local=DB[key]||(DB[key]=[]);
  var byId={};local.forEach(function(x){byId[x.id]=x;});
  remoteArr.forEach(function(rm){
    var lo=byId[rm.id];
    if(!lo){local.unshift(rm);byId[rm.id]=rm;}
    else if((rm.atualizadoEm||0)>(lo.atualizadoEm||0)&&!lo._dirty){
      // preserva fotos locais se o remoto (lista) não as trouxe
      if(key==='rs_nc'){if(rm.foto_antes===undefined)rm.foto_antes=lo.foto_antes;if(rm.foto_depois===undefined)rm.foto_depois=lo.foto_depois;if(!(rm.fotos&&rm.fotos.length))rm.fotos=lo.fotos||[];if(!(rm.fotos_depois&&rm.fotos_depois.length))rm.fotos_depois=lo.fotos_depois||[];}
      var idx=local.findIndex(function(x){return x.id===rm.id;});if(idx>=0)local[idx]=rm;
    }
  });
}

// ---- sync offline-first (mesmo mecanismo do app) ----
function rondaSyncUp(){
  if(!SB||!USER||!navigator.onLine)return Promise.resolve();
  var tasks=[];
  (DB.rs_emp||[]).filter(function(e){return e._dirty;}).forEach(function(e){
    var row=rsEmpRow(e),op=e._new?SB.from('rs_empreiteiras').insert(row):SB.from('rs_empreiteiras').update(row).eq('id',e.id);
    tasks.push(op.then(function(r){if(!r.error){e._dirty=false;e._new=false;}return r;}));
  });
  (DB.rs_nc||[]).filter(function(n){return n._dirty&&n.empreiteira_id;}).forEach(function(n){
    var row=rsNcRow(n),op=n._new?SB.from('rs_nao_conformidades').insert(row):SB.from('rs_nao_conformidades').update(row).eq('id',n.id);
    tasks.push(op.then(function(r){if(!r.error){n._dirty=false;n._new=false;}return r;}));
  });
  if(!tasks.length)return Promise.resolve();
  return Promise.all(tasks).then(function(){save();});
}
function rondaSyncDown(cb){
  if(!SB||!USER||!navigator.onLine){cb&&cb();return;}
  Promise.all([
    SB.from('rs_empreiteiras').select('*').order('criado_em',{ascending:true}),
    SB.from('rs_nao_conformidades').select('id,codigo,empreiteira_id,nr,descricao,nivel_risco,local,obra,prazo,responsavel_correcao,status,reincidencia,data_registro,data_resolucao,fiscal_id,atualizado_em').order('data_registro',{ascending:false})
  ]).then(function(res){
    if(res[0]&&res[0].data)rondaMerge('rs_emp',res[0].data.map(rsEmpFromDB));
    if(res[1]&&res[1].data)rondaMerge('rs_nc',res[1].data.map(rsNcFromDB));
    save();cb&&cb();
  }).catch(function(){cb&&cb();});
}
function rondaAgendarSync(){if(!SB||!USER||!navigator.onLine)return;atualizarSyncChip();clearTimeout(window._rsTimer);window._rsTimer=setTimeout(function(){rondaSyncUp().then(function(){atualizarSyncChip();});},1500);}
function rondaCarregar(cb){
  RS_LOADING=true;
  if(!SB||!USER||!navigator.onLine){RS_LOADING=false;cb&&cb();return;}
  rondaSyncUp().then(function(){rondaSyncDown(function(){RS_LOADING=false;cb&&cb();});}).catch(function(){RS_LOADING=false;cb&&cb();});
}
var RS_LOADING=false;
function rondaFetchFotos(ids,cb){
  if(!SB||!navigator.onLine||!ids.length){cb&&cb();return;}
  SB.from('rs_nao_conformidades').select('id,foto_antes,foto_depois,fotos,fotos_depois').in('id',ids).then(function(r){
    if(r&&r.data)r.data.forEach(function(row){var n=rsNcById(row.id);if(n){n.foto_antes=row.foto_antes;n.foto_depois=row.foto_depois;n.fotos=row.fotos||[];n.fotos_depois=row.fotos_depois||[];}});
    save();cb&&cb();
  }).catch(function(){cb&&cb();});
}

    +'</div>';
  if(!todos.length){out+='<div class="empty"><div class="ei">🛡️</div><p>Nenhuma não conformidade registrada ainda.</p></div>';return out;}
  // gráfico temporal: diário / semanal / mensal
  function chip(m2,l){return '<button class="sync-chip" style="'+(RS_SERIE===m2?'border-color:var(--g);color:var(--g2)':'')+'" onclick="rsSetSerie(\''+m2+'\')">'+l+'</button>';}
  out+='<div class="sec-l">NCs por período</div>'
    +'<div style="display:flex;gap:7px;margin-bottom:10px">'+chip('dia','Diário')+chip('semana','Semanal')+chip('mes','Mensal')+'</div>'
    +'<div class="gr-card">'+rsSerieBars()+'</div>';
  // gráfico: NCs por empresa (texto)
  var porEmp={};todos.forEach(function(e){var k=e.empresa||'—';porEmp[k]=(porEmp[k]||0)+1;});
  var maxE=Math.max.apply(null,Object.keys(porEmp).map(function(k){return porEmp[k];}).concat([1]));
  var barsE=Object.keys(porEmp).sort(function(a,b){return porEmp[b]-porEmp[a];}).slice(0,8).map(function(k){
    return '<div class="bar-row"><div class="bar-lb">'+rsEsc(k)+'</div><div class="bar-tk"><div class="bar-fill" style="width:'+Math.round(porEmp[k]/maxE*100)+'%;background:var(--gg)"></div></div><div class="bar-vl">'+porEmp[k]+'</div></div>';
  }).join('');
  out+='<div class="sec-l">NCs por empresa</div><div class="gr-card">'+barsE+'</div>';
  // gráfico: por nível de risco
  var porR={baixo:0,medio:0,grave:0,iminente:0};todos.forEach(function(e){porR[e.nivel_risco]=(porR[e.nivel_risco]||0)+1;});
  var maxR=Math.max.apply(null,Object.keys(porR).map(function(k){return porR[k];}).concat([1]));
  var barsR=['iminente','grave','medio','baixo'].map(function(k){
    return '<div class="bar-row"><div class="bar-lb">'+rsNivel(k).l+'</div><div class="bar-tk"><div class="bar-fill" style="width:'+Math.round((porR[k]||0)/maxR*100)+'%;background:'+rsNivel(k).c+'"></div></div><div class="bar-vl">'+(porR[k]||0)+'</div></div>';
  }).join('');
  out+='<div class="sec-l">Por nível de risco</div><div class="gr-card">'+barsR+'</div>';
  // gráfico: por NR
  var porNR={};todos.forEach(function(e){var k=e.nr||'—';porNR[k]=(porNR[k]||0)+1;});
  var maxNR=Math.max.apply(null,Object.keys(porNR).map(function(k){return porNR[k];}).concat([1]));
  var barsNR=Object.keys(porNR).sort(function(a,b){return porNR[b]-porNR[a];}).slice(0,8).map(function(k){
    return '<div class="bar-row"><div class="bar-lb">'+rsEsc(k)+'</div><div class="bar-tk"><div class="bar-fill" style="width:'+Math.round(porNR[k]/maxNR*100)+'%;background:#3b82f6"></div></div><div class="bar-vl">'+porNR[k]+'</div></div>';
  }).join('');
  out+='<div class="sec-l">Por norma (NR)</div><div class="gr-card">'+barsNR+'</div>';
  return out;
}

    +'<div style="display:flex;gap:8px">'

      +['','aberta','em_correcao','corrigida','vencida'].map(function(s){return '<option value="'+s+'"'+(RS_F.status===s?' selected':'')+'>'+(s?rsStat(s).l:'Todos')+'</option>';}).join('')+'</select></div>'
    +'<div class="iw" style="flex:1"><label>Risco</label><select class="inp" onchange="RS_F.risco=this.value;render()">'

    +'</div></div>';
  var lista=(DB.rs_nc||[]).slice().sort(function(a,b){return (b.data_registro||'').localeCompare(a.data_registro||'');}).filter(function(n){
    if(RS_F.emp&&ncEmpresa(n)!==RS_F.emp)return false;

  // fotos antes/depois (object-fit contain p/ foto em pé)

  out+='<div style="flex:1"><div style="font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">Depois</div>'

  if(pode){
    out+='<div class="photo-btns" style="margin-bottom:10px"><button class="photo-btn" onclick="ncFotoCam(\'ncbefore:'+n.id+'\')">📷 Foto (antes)</button><button class="photo-btn" onclick="ncFotoGal(\'ncbefore:'+n.id+'\')">🖼️ Galeria (antes)</button></div>';
  }
  // ações de status
  if(pode&&ef!=='corrigida'){
    out+='<div class="sec-l">Atualizar correção</div>';
    if(n.status==='aberta')out+='<button class="btn btn-o btn-w" style="margin-bottom:8px" onclick="rsStatusNC(\''+n.id+'\',\'em_correcao\')">🔧 Marcar em correção</button>';

    out+='<button class="btn btn-g btn-w" onclick="rsCorrigir(\''+n.id+'\')">✅ Marcar como corrigida</button>';
  } else if(pode&&ef==='corrigida'){
    out+='<div class="okmsg">✔ Corrigida em '+fd((''+(n.data_resolucao||'')).slice(0,10))+(rsAtrasada(n)?' (fora do prazo)':' (no prazo)')+'</div>';
    out+='<button class="btn btn-o btn-w" style="margin-top:10px" onclick="rsStatusNC(\''+n.id+'\',\'em_correcao\')">↩ Reabrir</button>';
  }
  if(podeApagar())out+='<button class="btn btn-d btn-w" style="margin-top:10px" onclick="delNC(\''+n.id+'\')">Excluir NC</button>';
  return out;

      +(a&&a.img
        ?'<img src="'+a.img+'" class="sig-prev"><button class="btn btn-o" style="width:100%;margin-top:8px" onclick="relAbrirSig(\''+role+'\')">↻ Assinar novamente</button>'
        :'<button class="btn btn-g" style="width:100%" onclick="relAbrirSig(\''+role+'\')">✍️ Assinar agora</button>')
      +'</div>';
  }

    +'<div class="card" style="padding:13px 16px;font-size:12px;color:var(--tx3)">Assine direto na tela (dedo ou caneta). As assinaturas saem estampadas no PDF.</div>'
    +slot('tec','Responsável pela auditoria',r.auditor,'relAssTec')
    +slot('resp','Responsável da área presente ou auditado',r.acompanhante,'relAssResp')
    +'<div class="act-row"><button class="btn btn-o" onclick="relGerarPDF()">Gerar sem assinar</button><button class="btn btn-g btn-grow" onclick="relGerarPDF()">📄 Gerar PDF</button></div>'
    +'<div style="height:20px"></div>';
}
function relSetAssNome(role,v){if(!REL.ass)REL.ass={};if(!REL.ass[role])REL.ass[role]={};REL.ass[role].nome=v;if(role==='tec')REL.auditor=v;else REL.acompanhante=v;}
function relAbrirSig(role){
  var inp=document.getElementById(role==='tec'?'relAssTec':'relAssResp');
  if(inp){if(!REL.ass)REL.ass={};if(!REL.ass[role])REL.ass[role]={};REL.ass[role].nome=inp.value;}
  SIG.role=role;
  var titulo=(role==='tec')?'Assinatura — Responsável pela auditoria':'Assinatura — Responsável da área presente ou auditado';
  var html='<div class="sig-ov" id="sigOv"><div class="sig-box">'
    +'<div class="sig-tt">'+titulo+'</div>'
    +'<div class="sig-sub">Assine no quadro abaixo</div>'
    +'<canvas id="sigCv"></canvas>'
    +'<div class="sig-btns"><button class="btn btn-o" onclick="sigLimpar()">Limpar</button><button class="btn btn-o" onclick="fecharSig()">Cancelar</button><button class="btn btn-g" style="flex:1" onclick="relSigConfirmar()">✓ Confirmar</button></div>'
    +'</div></div>';
  var d=document.createElement('div');d.innerHTML=html;document.body.appendChild(d.firstChild);
  var cv=document.getElementById('sigCv');
  var rect=cv.getBoundingClientRect();
  cv.width=Math.round(rect.width*2);cv.height=Math.round(rect.height*2);
  var ctx=cv.getContext('2d');ctx.scale(2,2);
  ctx.fillStyle='#ffffff';ctx.fillRect(0,0,rect.width,rect.height);
  ctx.strokeStyle='#16243d';ctx.lineWidth=2.4;ctx.lineCap='round';ctx.lineJoin='round';
  SIG.cv=cv;SIG.ctx=ctx;SIG.empty=true;SIG.draw=false;
  function pos(e){var rr=cv.getBoundingClientRect();return {x:e.clientX-rr.left,y:e.clientY-rr.top};}
  cv.addEventListener('pointerdown',function(e){e.preventDefault();SIG.draw=true;SIG.empty=false;var pt=pos(e);ctx.beginPath();ctx.moveTo(pt.x,pt.y);ctx.lineTo(pt.x+0.1,pt.y+0.1);ctx.stroke();try{cv.setPointerCapture(e.pointerId)}catch(ex){}});
  cv.addEventListener('pointermove',function(e){if(!SIG.draw)return;e.preventDefault();var pt=pos(e);ctx.lineTo(pt.x,pt.y);ctx.stroke();});
  cv.addEventListener('pointerup',function(){SIG.draw=false;});
  cv.addEventListener('pointercancel',function(){SIG.draw=false;});
}
function relSigConfirmar(){
  if(SIG.empty){toast('Assine antes de confirmar','e');return;}
  var img=SIG.cv.toDataURL('image/png');
  if(!REL.ass)REL.ass={};
  var inp=document.getElementById(SIG.role==='tec'?'relAssTec':'relAssResp');
  var nome=(REL.ass[SIG.role]&&REL.ass[SIG.role].nome)||(inp?inp.value.trim():'');
  REL.ass[SIG.role]={img:img,nome:nome};
  if(SIG.role==='tec')REL.auditor=nome;else REL.acompanhante=nome;
  fecharSig();relPersist();render();toast('Assinatura registrada!','s');
}

function relPDFById(id){

function relGerarPDF(){
  if(!REL)return;

  if(rp&&rp.value.trim()){if(!REL.ass)REL.ass={};if(!REL.ass.resp)REL.ass.resp={};REL.ass.resp.nome=rp.value.trim();REL.acompanhante=rp.value.trim();}

function relPdfAssinaturas(doc,r,c,y,W,mg){

  doc.text('Responsável pela auditoria',sx1+sw/2,sly+9,{align:'center'});
  if(assR&&assR.img){try{doc.addImage(assR.img,'PNG',sx2,y,sw,sh)}catch(e){}}

function _relPDF(){
  var r=REL;if(!r){toast('Sem relato','e');return;}
  var jsPDF=window.jspdf.jsPDF,doc=new jsPDF('p','mm','a4'),W=210,H=297,mg=15,c=cfg(),y=0,pg=1;
  function header(){rsPdfHeader(doc,W,mg,c,'RELATO DE NÃO CONFORMIDADE',rsTrunc(r.empresa||'',58),[220,38,38]);}
  function footer(p){rsPdfFooter(doc,W,H,mg,c,p);}
  function ensure(h){if(y+h>H-16){footer(pg);doc.addPage();pg++;header();y=36;}}
  header();y=36;
  doc.setTextColor(20,20,20);doc.setFont('helvetica','bold');doc.setFontSize(13);
  doc.text(rsTrunc(r.empresa||'—',60),mg,y);y+=7;
  doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(90,90,90);
  doc.text('Código: '+(r.codigo||'—')+'   ·   Data: '+fd((''+(r.data||'')).slice(0,10)),mg,y);y+=5;
  if(r.obra){doc.text('Obra: '+rsTrunc(r.obra,80),mg,y);y+=5;}
  if(r.local){doc.text('Local/setor: '+rsTrunc(r.local,80),mg,y);y+=5;}
  doc.text('Emitido por: '+((USER&&USER.nome)||r.auditor||'—'),mg,y);y+=6;
  doc.setFont('helvetica','italic');doc.setFontSize(8);doc.setTextColor(120,120,120);
  var introL=doc.splitTextToSize('Este documento registra as não conformidades de segurança identificadas na vistoria, com o nível de risco, o prazo e o responsável por corrigir cada item.',W-mg*2);
  doc.text(introL,mg,y);y+=introL.length*4+4;
  (r.itens||[]).forEach(function(it,i){
    var nv=rsNivel(it.nivel_risco);
    ensure(48);
    doc.setDrawColor(225,225,225);doc.setLineWidth(0.3);doc.line(mg,y,W-mg,y);y+=6;
    doc.setTextColor(20,20,20);doc.setFont('helvetica','bold');doc.setFontSize(11);
    doc.text('Não conformidade '+(i+1),mg,y);
    // selo de risco colorido, por extenso
    doc.setFont('helvetica','bold');doc.setFontSize(8);
    var selo=rsNivelTxt(it.nivel_risco).toUpperCase(),sbw=doc.getTextWidth(selo)+7,rc=hexToRgb(nv.c);
    doc.setFillColor(rc[0],rc[1],rc[2]);doc.roundedRect(W-mg-sbw,y-4.2,sbw,6.2,1.4,1.4,'F');
    doc.setTextColor(255,255,255);doc.text(selo,W-mg-sbw+3.5,y+0.4);
    y+=7;
    function campo(lbl,val){
      doc.setFontSize(8.7);doc.setFont('helvetica','bold');
      var lw=doc.getTextWidth(lbl)+1.5;
      doc.setFont('helvetica','normal');
      var vl=doc.splitTextToSize(''+(val||'—'),W-mg*2-lw);
      ensure(Math.max(4.9,vl.length*4.6)+1);
      doc.setFont('helvetica','bold');doc.setTextColor(95,95,95);doc.text(lbl,mg,y);
      doc.setFont('helvetica','normal');doc.setTextColor(40,40,40);doc.text(vl,mg+lw,y);
      y+=Math.max(4.9,vl.length*4.6);
    }
    campo('Norma de segurança: ',it.nr||'—');
    campo('Nível de risco: ',rsNivelTxt(it.nivel_risco)+' — '+rsNivelDesc(it.nivel_risco));
    campo('O que está irregular: ',it.descricao||'(sem descrição)');
    campo('Local na obra: ',it.local||'—');
    campo('Prazo para correção: ',it.prazo?fd(it.prazo):'a definir');
    campo('Responsável pela correção: ',it.responsavel_correcao||'a definir');
    y+=1.5;
    var fotos=it.fotos||[];
    if(fotos.length){
      ensure(6);doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(110,110,110);
      doc.text('Registro fotográfico:',mg,y);y+=4;
      var fw=(W-mg*2-6)/2,fh=55;
      for(var k=0;k<fotos.length;k+=2){
        ensure(fh+4);
        doc.setDrawColor(225,225,225);doc.setLineWidth(0.2);doc.rect(mg,y,fw,fh);
        rsAddFotoFit(doc,fotos[k],mg,y,fw,fh);
        if(fotos[k+1]){doc.rect(mg+fw+6,y,fw,fh);rsAddFotoFit(doc,fotos[k+1],mg+fw+6,y,fw,fh);}
        y+=fh+4;
      }
    }
    y+=2.5;
  });
  if((r.obsGeral||'').trim()){
    ensure(14);
    doc.setTextColor(22,163,74);doc.setFont('helvetica','bold');doc.setFontSize(10);doc.text('Observações gerais',mg,y);y+=5;
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(55,55,55);
    var ol=doc.splitTextToSize(r.obsGeral,W-mg*2);ensure(ol.length*4.4+2);doc.text(ol,mg,y);y+=ol.length*4.4+4;
  }
  ensure(28);
  doc.setFillColor(247,248,250);doc.roundedRect(mg,y,W-mg*2,21,2,2,'F');

// ---- sync offline-first (igual ao RondaSafe) ----
function dvSyncUp(){
  if(!SB||!USER||!navigator.onLine)return Promise.resolve();
  var tasks=[];
  (DB.dv||[]).filter(function(d){return d._dirty;}).forEach(function(d){
    var row=dvRow(d),op=d._new?SB.from('cs18_desvios').insert(row):SB.from('cs18_desvios').update(row).eq('id',d.id);
    tasks.push(op.then(function(r){if(!r.error){d._dirty=false;d._new=false;}return r;}));
  });
  if(!tasks.length)return Promise.resolve();
  return Promise.all(tasks).then(function(){save();});
}
function dvMerge(arr){
  DB.dv=DB.dv||[];
  arr.forEach(function(rm){
    var lo=dvById(rm.id);
    if(!lo){DB.dv.push(rm);}
    else if((rm.atualizadoEm||0)>(lo.atualizadoEm||0)&&!lo._dirty){
      rm.foto_antes=rm.foto_antes||lo.foto_antes; rm.foto_depois=rm.foto_depois||lo.foto_depois; rm.assinatura=rm.assinatura||lo.assinatura; if(!(rm.fotos&&rm.fotos.length))rm.fotos=lo.fotos||[]; if(!(rm.fotos_depois&&rm.fotos_depois.length))rm.fotos_depois=lo.fotos_depois||[];
      var i=DB.dv.indexOf(lo);DB.dv[i]=rm;
    }
  });
}
function dvSyncDown(cb){
  if(!SB||!USER||!navigator.onLine){cb&&cb();return;}
  SB.from('cs18_desvios').select('id,codigo,tipo,descricao,local,obra,empresa,nr,nivel_risco,pessoa_orientada,acao_imediata,resolvido_na_hora,responsavel_acao,prazo,status,tratativa,autor_nome,fiscal_id,hora_orientacao,assinante,data_registro,data_resolucao,atualizado_em').order('data_registro',{ascending:false}).then(function(r){
    if(r&&r.data)dvMerge(r.data.map(dvFromDB));
    save();cb&&cb();
  }).catch(function(){cb&&cb();});
}
function dvAgendarSync(){if(!SB||!USER||!navigator.onLine)return;atualizarSyncChip();clearTimeout(window._dvTimer);window._dvTimer=setTimeout(function(){dvSyncUp().then(function(){atualizarSyncChip();});},1500);}
function dvCarregar(cb){
  DV_LOADING=true;
  if(!SB||!USER||!navigator.onLine){DV_LOADING=false;cb&&cb();return;}
  dvSyncUp().then(function(){dvSyncDown(function(){DV_LOADING=false;cb&&cb();});}).catch(function(){DV_LOADING=false;cb&&cb();});
}
function dvFetchFotos(ids,cb){
  if(!SB||!navigator.onLine||!ids.length){cb&&cb();return;}
  SB.from('cs18_desvios').select('id,foto_antes,foto_depois,fotos,fotos_depois,assinatura').in('id',ids).then(function(r){

    save();cb&&cb();
  }).catch(function(){cb&&cb();});
}

// ---- semáforo de prazos ----
function dvDiasPrazo(d){
  if(!d.prazo)return null;
  var hj=new Date();hj.setHours(0,0,0,0);
  var p=new Date(d.prazo+'T00:00:00');
  return Math.round((p-hj)/86400000);
}
function dvPrazoInfo(d){
  if(d.status==='resolvido')return {cls:'ok',c:'#16a34a',label:'Resolvido'};
  var dias=dvDiasPrazo(d);
  if(dias===null)return {cls:'semprazo',c:'#64748b',label:'Sem prazo'};
  if(dias<0)return {cls:'vencido',c:'#dc2626',label:'Vencido há '+Math.abs(dias)+'d'};
  if(dias===0)return {cls:'vencendo',c:'#d97706',label:'Vence hoje'};
  if(dias<=2)return {cls:'vencendo',c:'#d97706',label:'Vence em '+dias+'d'};
  return {cls:'noprazo',c:'#16a34a',label:'No prazo · '+dias+'d'};
}
// pendente vencendo = prazo entre hoje e +2 dias; vencido = prazo passou
function dvResumo(){
  var all=DB.dv||[];
  var R={total:all.length,pend:0,resolv:0,noPrazo:0,vencendo:0,vencido:0,semPrazo:0,naHora:0,porTipo:{comportamental:0,condicao:0,documental:0}};
  all.forEach(function(d){
    R.porTipo[d.tipo]=(R.porTipo[d.tipo]||0)+1;
    if(d.resolvido_na_hora)R.naHora++;
    if(d.status==='resolvido'){R.resolv++;return;}
    R.pend++;
    var dias=dvDiasPrazo(d);
    if(dias===null)R.semPrazo++;
    else if(dias<0)R.vencido++;
    else if(dias<=2)R.vencendo++;
    else R.noPrazo++;
  });
  return R;
}

// ---- tendência semanal (novos x resolvidos, últimas 8 semanas) ----
function dvWeekly(){
  var now=new Date(),ws=weekStart(now),keys=[],labels=[],i,d;
  for(i=7;i>=0;i--){d=new Date(ws);d.setDate(ws.getDate()-i*7);keys.push('W'+ymd(d));labels.push(('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2));}
  var novos=keys.map(function(){return 0;}),resolv=keys.map(function(){return 0;});
  (DB.dv||[]).forEach(function(x){
    if(x.data_registro){var k='W'+ymd(weekStart(new Date(x.data_registro)));var ix=keys.indexOf(k);if(ix>=0)novos[ix]++;}
    if(x.status==='resolvido'&&x.data_resolucao){var k2='W'+ymd(weekStart(new Date(x.data_resolucao)));var ix2=keys.indexOf(k2);if(ix2>=0)resolv[ix2]++;}
  });
  return {labels:labels,novos:novos,resolv:resolv};
}
function dvBarDuplo(w){
  var max=Math.max.apply(null,w.novos.concat(w.resolv).concat([1]));
  var bars=w.labels.map(function(lb,i){
    var h1=Math.round(w.novos[i]/max*100),h2=Math.round(w.resolv[i]/max*100);
    return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:2px">'
      +'<div style="display:flex;align-items:flex-end;gap:2px;height:100%;width:100%;justify-content:center">'
      +'<div title="Novos" style="width:42%;background:#d97706;border-radius:3px 3px 0 0;height:'+h1+'%;min-height:'+(w.novos[i]?3:0)+'px"></div>'
      +'<div title="Resolvidos" style="width:42%;background:#16a34a;border-radius:3px 3px 0 0;height:'+h2+'%;min-height:'+(w.resolv[i]?3:0)+'px"></div>'
      +'</div>'
      +'<div style="font-size:8px;color:var(--tx3);white-space:nowrap">'+lb+'</div></div>';
  }).join('');
  return '<div style="display:flex;align-items:flex-end;gap:5px;height:120px;padding:6px 0">'+bars+'</div>'
    +'<div style="display:flex;gap:16px;justify-content:center;font-size:11px;color:var(--tx2);margin-top:4px">'
    +'<span><span style="display:inline-block;width:10px;height:10px;background:#d97706;border-radius:2px;margin-right:4px"></span>Registrados</span>'
    +'<span><span style="display:inline-block;width:10px;height:10px;background:#16a34a;border-radius:2px;margin-right:4px"></span>Resolvidos</span></div>';
}

// Consolida NCs (rs_nc, com status) + itens de relatos (rs_relatos)
// em status resolvido/pendente/vencido por empresa, com PDF de
// cobrança e limpeza de registros. Reusa helpers do RondaSafe.
// ═══════════════════════════════════════════════════
var RS_BI_PER='mes', RS_BI_OBRA='', RS_BI_EMP='', RS_BI_OPEN='';
function rsbiSetEmp(v){RS_BI_EMP=v;render();}
function rsbiSetPer(v){RS_BI_PER=v;render();}
function rsbiIntervalo(){
  var now=new Date();function z(n){return('0'+n).slice(-2);}function ymd(d){return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate());}
  var ini,fim=ymd(now),lab;
  if(RS_BI_PER==='dia'){ini=fim;lab='Diário · '+fd(fim);}
  else if(RS_BI_PER==='semana'){var w=new Date(now),dow=(w.getDay()+6)%7;w.setDate(w.getDate()-dow);ini=ymd(w);lab='Semanal · '+fd(ini)+' a '+fd(fim);}
  else if(RS_BI_PER==='ano'){ini=now.getFullYear()+'-01-01';lab='Anual · '+now.getFullYear();}
  else if(RS_BI_PER==='tudo'){ini='';fim='';lab='Todo o período';}
  else{ini=ymd(new Date(now.getFullYear(),now.getMonth(),1));lab='Mensal · '+mesLabel(ymd(now).slice(0,7));}
  return {ini:ini,fim:fim,lab:lab};
}
function rsbiSetObra(v){RS_BI_OBRA=v;render();}
function rsbiToggle(n){RS_BI_OPEN=(RS_BI_OPEN===n?'':n);render();}

// obras presentes nas duas fontes
function rsbiObras(){
  var set={};
  (DB.rs_nc||[]).forEach(function(n){if(n.obra&&(''+n.obra).trim())set[(''+n.obra).trim()]=1;});
  (DB.rs_relatos||[]).forEach(function(r){if(r.obra&&(''+r.obra).trim())set[(''+r.obra).trim()]=1;});
  return Object.keys(set).sort(function(a,b){return a.localeCompare(b);});
}
// eventos unificados (1 por NC e 1 por item de relato)
function rsbiEventos(){
  var iv=rsbiIntervalo(),obra=RS_BI_OBRA,ev=[];
  function inPer(dt){if(iv.ini&&dt<iv.ini)return false;if(iv.fim&&dt>iv.fim)return false;return true;}
  (DB.rs_nc||[]).forEach(function(n){
    var dt=(''+(n.data_registro||'')).slice(0,10);
    if(!inPer(dt))return;
    if(obra&&(n.obra||'')!==obra)return;
    if(RS_BI_EMP&&(ncEmpresa(n)||'—')!==RS_BI_EMP)return;
    var ef=statusEf(n);
    var st=ef==='corrigida'?'resolvido':(ef==='vencida'?'vencido':'pendente');
    var dias=(n.status==='corrigida'&&n.data_registro&&n.data_resolucao)?Math.max(0,Math.round((new Date(n.data_resolucao)-new Date(n.data_registro))/86400000)):null;
    ev.push({empresa:ncEmpresa(n)||'—',nivel:n.nivel_risco||'medio',nr:n.nr||'—',data:dt,prazo:n.prazo||'',
      status:st,reinc:!!n.reincidencia,fonte:'nc',id:n.id,foto:n.foto_antes||n.foto_depois||'',fotos:fotosDe(n).concat(fotosDepoisDe(n)),resolvDias:dias,descricao:n.descricao||'',obra:n.obra||'',responsavel:n.responsavel_correcao||''});
  });
  (DB.rs_relatos||[]).forEach(function(r){
    var dt=(''+(r.data||(''+(r.data_registro||'')).slice(0,10))).slice(0,10);
    if(!inPer(dt))return;
    if(obra&&(r.obra||'')!==obra)return;
    if(RS_BI_EMP&&(r.empresa||'—')!==RS_BI_EMP)return;
    (r.itens||[]).forEach(function(it){
      ev.push({empresa:(r.empresa||'—'),nivel:it.nivel_risco||'medio',nr:it.nr||'—',data:dt,prazo:it.prazo||'',
        status:relItemStatus(it),reinc:false,fonte:'rel',id:r.id,foto:(it.fotos&&it.fotos[0])||'',relItem:true,resolvDias:null,
        descricao:it.descricao||'',obra:r.obra||'',responsavel:it.responsavel_correcao||''});
    });
  });
  return ev;
}
function rsbiPorEmpresa(ev){
  var by={};
  ev.forEach(function(e){
    var k=e.empresa||'—';
    if(!by[k])by[k]={nome:k,total:0,resolvido:0,pendente:0,vencido:0,reinc:0,dias:[],eventos:[]};
    var o=by[k];o.total++;o[e.status]++;if(e.reinc)o.reinc++;
    if(e.resolvDias!=null)o.dias.push(e.resolvDias);
    o.eventos.push(e);
  });
  return Object.keys(by).map(function(k){var o=by[k];
    o.aberto=o.pendente+o.vencido;
    o.pctResol=o.total?Math.round(o.resolvido/o.total*100):0;
    o.prazoMedio=o.dias.length?Math.round(o.dias.reduce(function(a,b){return a+b;},0)/o.dias.length):null;
    return o;
  }).sort(function(a,b){return (b.vencido-a.vencido)||(b.aberto-a.aberto)||(b.total-a.total);});
}
function rsbiResumo(ev){
  var R={total:ev.length,resolvido:0,pendente:0,vencido:0,empresas:{}};
  ev.forEach(function(e){R[e.status]++;R.empresas[e.empresa]=1;});
  R.nEmp=Object.keys(R.empresas).length;
  R.pctResol=R.total?Math.round(R.resolvido/R.total*100):0;
  return R;
}
// barra empilhada (resolvido/pendente/vencido)
function rsbiStack(o,h){
  h=h||14;var t=o.total||1;
  function seg(v,c){var p=v/t*100;return p>0?'<div style="width:'+p+'%;background:'+c+'" title="'+v+'"></div>':'';}
  return '<div style="display:flex;height:'+h+'px;border-radius:7px;overflow:hidden;background:#0c1410">'
    +seg(o.resolvido,'#22c55e')+seg(o.pendente,'#f59e0b')+seg(o.vencido,'#ef4444')+'</div>';
}

  var out=rsBack('ronda')+rsHeader('📊 Painel BI / Cobrança','Status por empresa — resolvido, pendente e vencido');
  // filtros

// PDF de cobrança por empresa (enxuto, foco em pendências/vencidos)
function rsbiPDF(nome){
  var ev=rsbiEventos().filter(function(e){return e.empresa===nome;});
  if(!ev.length){toast('Sem apontamentos dessa empresa','e');return;}
  ensureJsPDF(function(){toast('Gerando cobrança...','i');rmCarregarFotos(function(){_rsbiPDF(nome,rsbiEventos().filter(function(e){return e.empresa===nome;}));});});
}
function _rsbiPDF(nome,ev){
  var jsPDF=window.jspdf.jsPDF,doc=new jsPDF('p','mm','a4'),W=210,H=297,mg=15,c=cfg(),y=0,pg=1;
  var R={total:ev.length,resolvido:0,pendente:0,vencido:0};
  ev.forEach(function(e){R[e.status]++;});
  var pct=R.total?Math.round(R.resolvido/R.total*100):0;
  function header(){rsPdfHeader(doc,W,mg,c,'COBRANÇA DE PENDÊNCIAS — '+(nome||'').toUpperCase(),'Período: '+rsbiIntervalo().lab+(RS_BI_OBRA?(' · Obra: '+RS_BI_OBRA):''),[220,38,38]);}
  function footer(p){rsPdfFooter(doc,W,H,mg,c,p);}
  function ensure(h){if(y+h>H-16){footer(pg);doc.addPage();pg++;header();y=36;}}
  header();y=36;
  doc.setTextColor(20,20,20);doc.setFont('helvetica','bold');doc.setFontSize(12);doc.text('Resumo',mg,y);y+=6;
  doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(80,80,80);
  doc.text('Emitido por '+((USER&&USER.nome)||'—')+' em '+fd(hoje())+'.',mg,y);y+=6;
  [['Total de apontamentos',R.total],['Resolvidos',R.resolvido+' ('+pct+'%)'],['Pendentes',R.pendente],['Vencidos (fora do prazo)',R.vencido]].forEach(function(kv){
    ensure(6);doc.setTextColor(50,50,50);doc.setFont('helvetica','bold');doc.text(''+kv[1],mg,y);
    doc.setFont('helvetica','normal');doc.setTextColor(110,110,110);doc.text(kv[0],mg+24,y);y+=6;
  });
  y+=3;
  function bloco(titulo,arr,cor){
    if(!arr.length)return;
    ensure(12);
    doc.setTextColor(cor[0],cor[1],cor[2]);doc.setFont('helvetica','bold');doc.setFontSize(11);doc.text(titulo+' ('+arr.length+')',mg,y);y+=2;
    doc.setDrawColor(cor[0],cor[1],cor[2]);doc.setLineWidth(0.4);doc.line(mg,y,W-mg,y);y+=5;
    arr.forEach(function(e){
      ensure(13);
      var nv=rsNivel(e.nivel);var rg=hexToRgb(nv.c);
      doc.setFillColor(rg[0],rg[1],rg[2]);doc.rect(mg,y-3.2,1.6,10,'F');
      doc.setTextColor(40,40,40);doc.setFont('helvetica','bold');doc.setFontSize(8.8);
      doc.text(rsEsc2(e.nr)+'  ·  '+nv.l,mg+4,y);
      if(e.prazo){doc.setTextColor(cor[0],cor[1],cor[2]);doc.setFontSize(8.2);doc.text('Prazo: '+fd(e.prazo),W-mg,y,{align:'right'});}
      y+=4.3;
      doc.setTextColor(70,70,70);doc.setFont('helvetica','normal');doc.setFontSize(8.5);
      var ds=doc.splitTextToSize(e.descricao||'(sem descrição)',W-2*mg-4);doc.text(ds.slice(0,2),mg+4,y);y+=ds.slice(0,2).length*4;
      if(e.responsavel){doc.setTextColor(120,120,120);doc.setFontSize(7.8);doc.text('Responsável: '+e.responsavel,mg+4,y);y+=3.6;}
      y+=2.4;
    });
    y+=3;
  }
  var venc=ev.filter(function(e){return e.status==='vencido';});

  bloco('VENCIDOS — exigem ação imediata',venc,[220,38,38]);

  if(!venc.length&&!pend.length){ensure(8);doc.setTextColor(22,163,74);doc.setFont('helvetica','bold');doc.setFontSize(11);doc.text('Sem pendências em aberto para esta empresa. ✓',mg,y);y+=8;}
  var pgo={pg:pg};y=pdfFotosSecao(doc,ev,W,H,mg,y+4,pgo,header,footer);pg=pgo.pg;
  footer(pg);
  doc.save(dataArq()+'_Cobranca_'+(nome||'empresa').replace(/[^a-zA-Z0-9]+/g,'-')+'.pdf');
  toast('PDF de cobrança gerado!','s');
}
function rsEsc2(s){return (''+(s==null?'':s));}

// fotos das evidências no PDF (grade 2 colunas, com quebra de página)
function pdfFmtImg(src){if(/^data:image\/png/i.test(src))return 'PNG';if(/^data:image\/webp/i.test(src))return 'WEBP';return 'JPEG';}
function pdfFotosSecao(doc,ev,W,H,mg,y,pgObj,headerFn,footerFn){
  // expande: 1 célula por FOTO (todas as fotos de cada evento)
  var comFoto=[];
  ev.forEach(function(e){
    var fts=(e.fotos&&e.fotos.length)?e.fotos:(e.foto?[e.foto]:[]);
    fts.forEach(function(ft){comFoto.push(Object.assign({},e,{foto:ft}));});
  });
  if(!comFoto.length)return y;
  if(comFoto.length>40)comFoto=comFoto.slice(0,40);
  function ensure(h){if(y+h>H-16){footerFn(pgObj.pg);doc.addPage();pgObj.pg++;headerFn();y=36;}}
  ensure(12);
  doc.setTextColor(22,163,74);doc.setFont('helvetica','bold');doc.setFontSize(11);doc.text('Evidências fotográficas',mg,y);y+=6;
  var colW=(W-2*mg-8)/2, imgH=42;
  for(var i=0;i<comFoto.length;i++){
    var e=comFoto[i],col=i%2,x=mg+col*(colW+8);
    if(col===0)ensure(imgH+14);
    var yy=y;
    try{doc.addImage(e.foto,pdfFmtImg(e.foto),x,yy,colW,imgH);}
    catch(err){doc.setFillColor(238,242,239);doc.rect(x,yy,colW,imgH,'F');doc.setTextColor(150,150,150);doc.setFontSize(8);doc.text('(imagem)',x+colW/2,yy+imgH/2,{align:'center'});}
    doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(60,60,60);
    doc.text((doc.splitTextToSize((e.empresa||'')+' · '+(e.status||''),colW)[0])||'',x,yy+imgH+4);
    doc.setFont('helvetica','normal');doc.setTextColor(110,110,110);
    doc.text((doc.splitTextToSize(e.descricao||'',colW)[0])||'',x,yy+imgH+8);
    if(col===1||i===comFoto.length-1)y=yy+imgH+13;
  }
  return y;
}

// apagar registros por empresa
function rsbiApagar(nome,modo){
  if(!podeApagar()){toast('Apenas o desenvolvedor pode apagar','e');return;}
  var msg=modo==='resolvidas'
    ? 'Apagar todas as NCs JÁ RESOLVIDAS de "'+nome+'"? Esta ação não pode ser desfeita.'
    : 'Apagar TODOS os registros de "'+nome+'" (NCs e relatos de vistoria)? Esta ação não pode ser desfeita.';
  if(!confirm(msg))return;
  var remover=[];
  DB.rs_nc=(DB.rs_nc||[]).filter(function(n){
    if(ncEmpresa(n)!==nome)return true;
    if(modo==='resolvidas'&&n.status!=='corrigida')return true;
    remover.push(n.id);return false;
  });
  if(modo==='todas'){
    DB.rs_relatos=(DB.rs_relatos||[]).filter(function(r){return (r.empresa||'—')!==nome;});
  }
  save();
  if(SB&&navigator.onLine&&remover.length){try{SB.from('rs_nao_conformidades').delete().in('id',remover).then(function(){});}catch(e){}}
  RS_BI_OPEN='';
  toast(remover.length+(modo==='todas'?' NC(s) e relatos apagados':' NC(s) apagadas'),'i');
  render();
}

var CD_EMP='';
function cdSetEmp(v){CD_EMP=v;render();}

// carrega as três fontes em sequência (offline-safe)
function cdCarregar(cb){
  var fns=[];
  if(typeof rondaCarregar==='function')fns.push(rondaCarregar);
  if(typeof dvCarregar==='function')fns.push(dvCarregar);
  if((ROLE==='admin'||ROLE==='dev')&&typeof carregarEquipe==='function')fns.push(carregarEquipe);
  var i=0;(function next(){if(i>=fns.length){cb&&cb();return;}var f=fns[i++];try{f(next);}catch(e){next();}})();
}

// ocorrências unificadas (1 objeto normalizado por NC / item de vistoria / desvio)
function cdOcorrencias(semFiltro){
  var arr=[];
  (DB.rs_nc||[]).forEach(function(n){
    var ef=statusEf(n);
    arr.push({id:n.id,fk:'nc',foto:n.foto_antes||n.foto_depois||'',fonte:'RondaSafe',empresa:ncEmpresa(n)||'—',tipo:'nc',tipoLabel:'NC RondaSafe',
      nivel:n.nivel_risco||'medio',status:ef==='corrigida'?'tratado':(ef==='vencida'?'vencido':'pendente'),
      atendido:(n.status==='em_correcao'||n.status==='corrigida'),prazo:n.prazo||'',
      dataReg:(''+(n.data_registro||'')).slice(0,10),dataResol:n.data_resolucao?(''+n.data_resolucao).slice(0,10):'',
      reinc:!!n.reincidencia,descricao:n.descricao||''});
  });
  (DB.rs_relatos||[]).forEach(function(r){
    var d=(''+(r.data||(''+(r.data_registro||'')).slice(0,10))).slice(0,10);
    (r.itens||[]).forEach(function(it,idx){
      var st=relItemStatus(it);
      arr.push({id:r.id,iid:idx,fk:'rel',foto:(it.fotos&&it.fotos[0])||'',fonte:'Vistoria',empresa:(r.empresa||'—'),tipo:'vistoria',tipoLabel:'Item de vistoria',
        nivel:it.nivel_risco||'medio',status:st,atendido:(it.status==='tratado'),prazo:it.prazo||'',
        dataReg:d,dataResol:(it.data_resolucao?(''+it.data_resolucao).slice(0,10):''),reinc:false,descricao:it.descricao||''});
    });
  });
  (DB.dv||[]).forEach(function(d){
    var venc=d.status!=='resolvido'&&d.prazo&&d.prazo<hoje();
    var tl=d.tipo==='comportamental'?'Ato inseguro':d.tipo==='condicao'?'Condição insegura':'NC documental';
    arr.push({id:d.id,fk:'dv',foto:d.foto_antes||d.foto_depois||'',fonte:'Desvios',empresa:(d.empresa||'—'),tipo:d.tipo,tipoLabel:tl,
      nivel:d.nivel_risco||'medio',status:d.status==='resolvido'?'tratado':(venc?'vencido':'pendente'),
      atendido:!!(d.acao_imediata||d.tratativa||d.resolvido_na_hora),prazo:d.prazo||'',
      dataReg:(''+(d.data_registro||'')).slice(0,10),dataResol:d.data_resolucao?(''+d.data_resolucao).slice(0,10):'',
      reinc:false,descricao:d.descricao||''});
  });
  if(!semFiltro&&CD_EMP)arr=arr.filter(function(o){return o.empresa===CD_EMP;});
  return arr;
}
function cdEmpresas(){
  var s={};cdOcorrencias(true).forEach(function(o){if(o.empresa&&o.empresa!=='—')s[o.empresa]=1;});
  return Object.keys(s).sort(function(a,b){return a.localeCompare(b);});
}
function cdInspMetrics(){
  var base=(typeof gerListaBase==='function')?gerListaBase():(DB.inspecoes||[]);
  if(CD_EMP)base=base.filter(function(i){return (i.empresa||'')===CD_EMP;});
  var nc=0,pctSum=0,pctN=0,concl=0;
  base.forEach(function(i){var r=i.resumo||{};nc+=(r.nc||0);if(i.status==='concluida'&&typeof r.pct==='number'){pctSum+=r.pct;pctN++;}if(i.status==='concluida')concl++;});
  return {total:base.length,concl:concl,nc:nc,conf:pctN?Math.round(pctSum/pctN):0};
}
function cdMetrics(arr){
  var M={total:arr.length,pendente:0,vencido:0,tratado:0,critico:0,dentroSLA:0,reinc:0,atendidos:0,dias:[]};
  arr.forEach(function(o){
    if(o.status==='tratado'){M.tratado++;if(o.dataReg&&o.dataResol){var dd=Math.round((new Date(o.dataResol)-new Date(o.dataReg))/86400000);if(dd>=0)M.dias.push(dd);}}
    else if(o.status==='vencido')M.vencido++;
    else M.pendente++;
    if((o.nivel==='grave'||o.nivel==='iminente')&&o.status!=='tratado')M.critico++;
    if(o.status!=='tratado'&&o.prazo&&o.prazo>=hoje())M.dentroSLA++;
    if(o.reinc)M.reinc++;
    if(o.atendido)M.atendidos++;
  });
  M.aberto=M.pendente+M.vencido;
  M.taxaTrat=M.total?Math.round(M.atendidos/M.total*100):0;
  M.taxaEncerr=M.total?Math.round(M.tratado/M.total*100):0;
  M.taxaAtend=M.total?Math.round(M.atendidos/M.total*100):0;
  M.taxaReinc=M.total?Math.round(M.reinc/M.total*100):0;
  M.tempoMedio=M.dias.length?(Math.round(M.dias.reduce(function(a,b){return a+b;},0)/M.dias.length*10)/10):0;
  M.planosAtras=M.vencido;
  return M;
}
function cdScore(M){
  if(!M.total)return {v:100,lab:'Sem dados',c:'#16a34a'};
  var s=100;
  s-=Math.round(M.vencido/M.total*45);
  s-=Math.round(M.critico/M.total*30);
  s-=Math.round(M.reinc/M.total*15);
  s-=Math.round((1-M.tratado/M.total)*20);
  s=Math.max(0,Math.min(100,s));
  var lab=s>=80?'Bom':s>=60?'Atenção':s>=40?'Ruim':'Crítico';
  var c=s>=80?'#16a34a':s>=60?'#d97706':s>=40?'#ea580c':'#dc2626';
  return {v:s,lab:lab,c:c};
}
// ---- SVG helpers ----
function cdDonut(segs,total){
  var r=52,cx=70,cy=70,circ=2*Math.PI*r,off=0;
  var paths=segs.filter(function(s){return s.val>0;}).map(function(s){
    var len=s.val/(total||1)*circ;
    var el='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+s.c+'" stroke-width="16" stroke-dasharray="'+len+' '+(circ-len)+'" stroke-dashoffset="'+(-off)+'" transform="rotate(-90 '+cx+' '+cy+')"/>';
    off+=len;return el;
  }).join('');
  return '<svg viewBox="0 0 140 140" width="132" height="132">'
    +'<circle cx="70" cy="70" r="52" fill="none" stroke="#eef2ef" stroke-width="16"/>'+paths
    +'<text x="70" y="66" text-anchor="middle" font-size="27" font-weight="800" fill="#0f1a14">'+(total||0)+'</text>'
    +'<text x="70" y="84" text-anchor="middle" font-size="10" fill="#7a8a80" letter-spacing="1">TOTAL</text></svg>';
}
function cdGauge(sc){
  var r=58,circ=2*Math.PI*r,len=sc.v/100*circ;
  return '<svg viewBox="0 0 150 150" width="150" height="150">'
    +'<circle cx="75" cy="75" r="58" fill="none" stroke="#eef2ef" stroke-width="13"/>'
    +'<circle cx="75" cy="75" r="58" fill="none" stroke="'+sc.c+'" stroke-width="13" stroke-linecap="round" stroke-dasharray="'+len+' '+(circ-len)+'" transform="rotate(-90 75 75)"/>'
    +'<text x="75" y="72" text-anchor="middle" font-size="34" font-weight="800" fill="'+sc.c+'">'+sc.v+'</text>'
    +'<text x="75" y="92" text-anchor="middle" font-size="10.5" font-weight="700" letter-spacing="1" fill="#7a8a80">'+(sc.lab||'').toUpperCase()+'</text></svg>';
}
function cdBars(items,h){
  h=h||150;var max=Math.max.apply(null,items.map(function(i){return i.v;}).concat([1]));
  return '<div class="xb-bars" style="height:'+h+'px">'+items.map(function(it){
    return '<div class="xb-bar"><div class="bv">'+it.v+'</div><div class="bk" style="height:'+Math.round(it.v/max*100)+'%;background:'+(it.c||'#16a34a')+'"></div><div class="bl">'+it.l+'</div></div>';
  }).join('')+'</div>';
}
function cdSpark(serie){
  var max=Math.max.apply(null,serie.map(function(s){return s.n;}).concat([1]));
  return '<div style="display:flex;align-items:flex-end;gap:2px;height:70px">'+serie.map(function(s){
    return '<div title="'+s.lb+': '+s.n+'" style="flex:1;background:#bfe3cc;border-radius:2px 2px 0 0;height:'+Math.max(2,Math.round(s.n/max*100))+'%"></div>';
  }).join('')+'</div>';
}
function cdSerie21(arr){
  var out=[],now=new Date();function z(n){return('0'+n).slice(-2);}
  for(var i=20;i>=0;i--){var d=new Date(now);d.setDate(now.getDate()-i);var k=d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate());out.push({k:k,lb:z(d.getDate())+'/'+z(d.getMonth()+1),n:0});}
  arr.forEach(function(o){var b=out.find(function(x){return x.k===o.dataReg;});if(b)b.n++;});
  return out;
}
function cdFoco(arr){
  var by={};arr.forEach(function(o){if(o.empresa==='—')return;if(!by[o.empresa])by[o.empresa]={nome:o.empresa,venc:0,crit:0,ab:0};
    if(o.status==='vencido')by[o.empresa].venc++;if((o.nivel==='grave'||o.nivel==='iminente')&&o.status!=='tratado')by[o.empresa].crit++;if(o.status!=='tratado')by[o.empresa].ab++;});
  var arr2=Object.keys(by).map(function(k){var o=by[k];o.peso=o.venc*3+o.crit*2+o.ab;return o;}).sort(function(a,b){return b.peso-a.peso;});
  return arr2[0]||null;
}

// VISÃO DE REUNIÃO — apresentação dos desvios do dia
// 3 faixas (Resolvido na hora / Em tratamento / Pendente),
// modo tela cheia para projetor e galeria de evidências.
// ═══════════════════════════════════════════════════
var RM_PER='hoje', RM_TIPO='', RM_GAL=false;
function rmSetPer(v){RM_PER=v;render();}
function rmSetTipo(v){RM_TIPO=v;render();}
function rmToggleGal(){RM_GAL=!RM_GAL;render();}
function rmIntervalo(){
  var now=new Date();function z(n){return('0'+n).slice(-2);}function ymd(d){return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate());}
  var ini,fim=ymd(now),lab;
  if(RM_PER==='hoje'){ini=fim;lab='Hoje · '+fd(fim);}
  else if(RM_PER==='semana'){var w=new Date(now),dow=(w.getDay()+6)%7;w.setDate(w.getDate()-dow);ini=ymd(w);lab='Esta semana';}
  else if(RM_PER==='mes'){ini=ymd(new Date(now.getFullYear(),now.getMonth(),1));lab='Este mês';}
  else{ini='';fim='';lab='Tudo';}
  return {ini:ini,fim:fim,lab:lab};
}
function rmEventos(){
  var iv=rmIntervalo(),ev=[];
  function inPer(dt){if(iv.ini&&dt<iv.ini)return false;if(iv.fim&&dt>iv.fim)return false;return true;}
  (DB.dv||[]).forEach(function(d){
    var dt=(''+(d.data_registro||'')).slice(0,10);if(!inPer(dt))return;
    if(RM_TIPO&&d.tipo!==RM_TIPO)return;
    var venc=d.status!=='resolvido'&&d.prazo&&d.prazo<hoje();
    ev.push({id:d.id,fonte:'dv',empresa:d.empresa||'—',tipo:d.tipo,
      tipoLabel:(d.tipo==='comportamental'?'Ato inseguro':d.tipo==='condicao'?'Condição insegura':'NC documental'),
      nivel:d.nivel_risco||'medio',descricao:d.descricao||'',autor:d.autor_nome||'',prazo:d.prazo||'',
      status:d.status==='resolvido'?'tratado':(venc?'vencido':'pendente'),
      naHora:!!d.resolvido_na_hora,atendido:!!(d.acao_imediata||d.responsavel_acao||d.tratativa),
      foto:d.foto_antes||d.foto_depois||'',foto2:d.foto_depois||'',dt:dt});
  });
  (DB.rs_nc||[]).forEach(function(n){
    var dt=(''+(n.data_registro||'')).slice(0,10);if(!inPer(dt))return;
    if(RM_TIPO&&RM_TIPO!=='nc')return;
    var ef=statusEf(n);
    ev.push({id:n.id,fonte:'nc',empresa:ncEmpresa(n)||'—',tipo:'nc',tipoLabel:'NC RondaSafe',
      nivel:n.nivel_risco||'medio',descricao:n.descricao||'',autor:'',prazo:n.prazo||'',
      status:ef==='corrigida'?'tratado':(ef==='vencida'?'vencido':'pendente'),
      naHora:(n.status==='corrigida'&&(!n.prazo||(''+(n.data_resolucao||'')).slice(0,10)===dt)),
      atendido:(n.status==='em_correcao'||n.status==='corrigida'),
      foto:n.foto_antes||n.foto_depois||'',foto2:n.foto_depois||'',dt:dt});
  });
  (DB.rs_relatos||[]).forEach(function(r){
    var dt=(''+(r.data||'')).slice(0,10);if(!inPer(dt))return;
    if(RM_TIPO&&RM_TIPO!=='vistoria')return;
    (r.itens||[]).forEach(function(it){
      ev.push({id:r.id,fonte:'rel',empresa:r.empresa||'—',tipo:'vistoria',tipoLabel:'Item de vistoria',
        nivel:it.nivel_risco||'medio',descricao:it.descricao||'',autor:'',prazo:it.prazo||'',
        status:relItemStatus(it),naHora:false,atendido:(it.status==='tratado'),
        foto:(it.fotos&&it.fotos[0])||'',foto2:'',dt:dt});
    });
  });
  if(CD_EMP)ev=ev.filter(function(e){return e.empresa===CD_EMP;});
  return ev;
}
function rmFaixa(e){
  if(e.status==='tratado')return 'resolvido';
  if(e.status==='vencido')return 'pendente';
  if(e.atendido||(e.prazo&&e.prazo>=hoje()))return 'tratamento';
  return 'pendente';
}
var RM_FAIXAS={
  resolvido:{l:'Resolvido na hora / encerrado',ic:'✅',c:'#16a34a'},
  tratamento:{l:'Em tratamento',ic:'🔧',c:'#d97706'},
  pendente:{l:'Pendente · p/ depois',ic:'⏳',c:'#dc2626'}
};
// busca e carrega fotos faltantes para a reunião
function rmCarregarFotos(cb){
  if(!SB||!navigator.onLine){cb&&cb();return;}
  var ncIds=[],dvIds=[];
  (DB.rs_nc||[]).forEach(function(n){if(n.foto_antes===undefined&&n.foto_depois===undefined)ncIds.push(n.id);});
  (DB.dv||[]).forEach(function(d){if(d.foto_antes===undefined&&d.foto_depois===undefined)dvIds.push(d.id);});
  var fns=[];
  if(ncIds.length&&typeof rondaFetchFotos==='function')fns.push(function(n){rondaFetchFotos(ncIds,n);});
  if(dvIds.length&&typeof dvFetchFotos==='function')fns.push(function(n){dvFetchFotos(dvIds,n);});
  var i=0;(function next(){if(i>=fns.length){cb&&cb();return;}fns[i++](next);})();
}
// lightbox de evidência
function cdLightbox(src){
  if(!src)return;
  var d=document.createElement('div');d.className='rm-lb';d.onclick=function(){d.remove();};
  var img=document.createElement('img');img.src=src;d.appendChild(img);
  var x=document.createElement('div');x.className='rm-lb-x';x.textContent='✕';d.appendChild(x);
  document.body.appendChild(d);
}
function rmAbrir(fonte,id){
  if(fonte==='dv'){dvAbrir(id);}
  else if(fonte==='nc'){rondaAbrirNC(id);}
  else if(fonte==='rel'){relVer(id);}
}
// modo apresentação (tela cheia)
function rmFullscreen(){
  try{
    if(!document.fullscreenElement){
      var el=document.documentElement;
      if(el.requestFullscreen)el.requestFullscreen();
      document.body.classList.add('rm-full');
    } else {
      if(document.exitFullscreen)document.exitFullscreen();
      document.body.classList.remove('rm-full');
    }
  }catch(e){document.body.classList.toggle('rm-full');}
  setTimeout(render,60);
}
if(typeof document!=='undefined'&&document.addEventListener){
  document.addEventListener('fullscreenchange',function(){if(!document.fullscreenElement)document.body.classList.remove('rm-full');});
}

function rmDash(){
  var ev=rmEventos();
  var grp={resolvido:[],tratamento:[],pendente:[]};
  ev.forEach(function(e){grp[rmFaixa(e)].push(e);});
  var naHora=ev.filter(function(e){return e.naHora;}).length;
  var iv=rmIntervalo();

  function chip(set,k,l,cur){return '<button class="sync-chip" style="'+(cur===k?'border-color:var(--g);color:var(--g2)':'')+'" onclick="'+set+'(\''+k+'\')">'+l+'</button>';}

  var out='<button class="back-btn" onclick="voltar()">← Central</button><div class="rm">';
  // cabeçalho
  out+='<div class="xb-h"><div><div class="xb-title">🎤 Visão de Reunião</div><div class="xb-sub">'+iv.lab+(CD_EMP?(' · '+rsEsc(CD_EMP)):'')+' · '+ev.length+' apontamento(s)</div></div>'
    +'<div style="display:flex;gap:6px">'
    +'<button class="xb-actbtn" style="padding:8px 12px" onclick="rmToggleGal()">'+(RM_GAL?'📋 Faixas':'🖼️ Evidências')+'</button>'
    +'<button class="xb-actbtn" style="padding:8px 12px" onclick="rmFullscreen()">🖥️ Tela cheia</button>'
    +'</div></div>';
  // filtros
  out+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">'+chip('rmSetPer','hoje','Hoje',RM_PER)+chip('rmSetPer','semana','Semana',RM_PER)+chip('rmSetPer','mes','Mês',RM_PER)+chip('rmSetPer','tudo','Tudo',RM_PER)+'</div>';
  out+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">'+chip('rmSetTipo','','Todos',RM_TIPO)+chip('rmSetTipo','comportamental','⚠️ Ato',RM_TIPO)+chip('rmSetTipo','condicao','🚧 Condição',RM_TIPO)+'</div>';

  if(!ev.length){out+='<div class="xb-card" style="text-align:center;color:#7a8a80;padding:24px">Nenhum desvio neste período/filtro.</div></div>';return out;}

  // resumo (contadores das 3 faixas + na hora)
  out+='<div style="display:flex;gap:8px;margin-bottom:10px">';
  ['resolvido','tratamento','pendente'].forEach(function(k){var F=RM_FAIXAS[k];
    out+='<div class="xb-card" style="flex:1;text-align:center;padding:12px 6px;border-top:4px solid '+F.c+'"><div style="font-size:26px;font-weight:800;color:'+F.c+'">'+grp[k].length+'</div><div style="font-size:10.5px;color:#5b6b62;line-height:1.2">'+F.ic+' '+F.l+'</div></div>';
  });
  out+='</div>';
  if(naHora)out+='<div style="background:#eafaef;border:1px solid #b7e6c6;color:#0b6b43;border-radius:10px;padding:8px 12px;font-size:12.5px;margin-bottom:10px">⚡ <b>'+naHora+'</b> desvio(s) resolvido(s) na hora pela equipe.</div>';

  if(RM_GAL){
    // galeria de evidências
    var comFoto=ev.filter(function(e){return e.foto;});
    out+='<div class="xb-card"><div class="ct">🖼️ Evidências fotográficas ('+comFoto.length+')</div>';
    if(!comFoto.length)out+='<div style="color:#7a8a80;font-size:13px">Nenhuma foto carregada para este período. Toque em "🔄" no topo para sincronizar as evidências.</div>';
    else{
      out+='<div class="rm-gal">'+comFoto.map(function(e){var F=RM_FAIXAS[rmFaixa(e)];
        return '<div class="rm-gcell" onclick="cdLightbox(\''+(''+e.foto).replace(/'/g,"\\'")+'\')">'
          +'<img src="'+e.foto+'" loading="lazy">'
          +'<div class="rm-gtag" style="background:'+F.c+'">'+F.ic+'</div>'
          +'<div class="rm-gcap">'+rsEsc(e.empresa)+'</div></div>';
      }).join('')+'</div>';
    }
    out+='</div></div>';
    return out;
  }

  // 3 colunas (faixas)
  out+='<div class="rm-cols">';
  ['resolvido','tratamento','pendente'].forEach(function(k){var F=RM_FAIXAS[k];
    out+='<div class="rm-col"><div class="rm-colh" style="background:'+F.c+'"><span>'+F.ic+' '+F.l+'</span><span>'+grp[k].length+'</span></div>';
    if(!grp[k].length)out+='<div style="color:#9bb0a4;font-size:12px;text-align:center;padding:14px 0">—</div>';
    out+=grp[k].map(rmCard).join('');
    out+='</div>';
  });
  out+='</div></div>';
  return out;
}
function rmCard(e){
  var nv=rsNivel(e.nivel);
  var thumb=e.foto
    ? '<img class="rm-thumb" src="'+e.foto+'" onclick="event.stopPropagation();cdLightbox(\''+(''+e.foto).replace(/'/g,"\\'")+'\')">'
    : '<div class="rm-no">📷</div>';
  return '<div class="rm-item" onclick="rmAbrir(\''+e.fonte+'\',\''+e.id+'\')">'
    +thumb
    +'<div style="flex:1;min-width:0">'
    +'<div style="font-size:11px;font-weight:800;color:#0b3d2e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+rsEsc(e.empresa)+(e.naHora?' <span style="color:#16a34a">⚡</span>':'')+'</div>'
    +'<div style="font-size:12px;color:#33433b;line-height:1.35;margin:2px 0;max-height:34px;overflow:hidden">'+rsEsc(e.descricao||'(sem descrição)')+'</div>'
    +'<div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center">'
    +'<span style="font-size:9px;font-weight:700;background:'+nv.c+'22;color:'+nv.c+';padding:1px 6px;border-radius:10px">'+nv.l+'</span>'
    +'<span style="font-size:9.5px;color:#7a8a80">'+e.tipoLabel+'</span>'
    +(e.prazo?'<span style="font-size:9.5px;color:#7a8a80">⏱ '+fd(e.prazo)+'</span>':'')
    +(e.autor?'<span style="font-size:9.5px;color:#7a8a80">👤 '+rsEsc(e.autor)+'</span>':'')
    +'</div></div></div>';
}



// ═══════════════════════════════════════════════════
// DRILL-DOWN dos KPIs — clicar no quadro abre a lista
// e permite marcar tratado / pendente direto.
// ═══════════════════════════════════════════════════
var CD_CAT='total';
function cdDrill(cat){CD_CAT=cat||'total';navTo('cd_lista');}
var CD_CAT_INFO={
  total:{l:'Todos os desvios',ic:'🗂️',c:'#0b3d2e'},
  pendente:{l:'Pendentes',ic:'⏳',c:'#d97706'},
  vencido:{l:'Vencidos (SLA)',ic:'⛔',c:'#dc2626'},
  critico:{l:'Críticos (grave/iminente)',ic:'🔺',c:'#7c3aed'},
  tratado:{l:'Tratados',ic:'✅',c:'#16a34a'},
  sla:{l:'Dentro do SLA',ic:'🎯',c:'#0ea5e9'}
};
function cdFiltrarCat(arr,cat){
  if(cat==='pendente')return arr.filter(function(o){return o.status==='pendente';});
  if(cat==='vencido')return arr.filter(function(o){return o.status==='vencido';});
  if(cat==='tratado')return arr.filter(function(o){return o.status==='tratado';});
  if(cat==='critico')return arr.filter(function(o){return (o.nivel==='grave'||o.nivel==='iminente')&&o.status!=='tratado';});
  if(cat==='sla')return arr.filter(function(o){return o.status==='pendente'&&o.prazo&&o.prazo>=hoje();});
  return arr;
}
// marca o status direto na fonte correta
function cdMarcar(fk,id,acao,iid){
  if(!ehGestor()){toast('Apenas admin/dev podem alterar o status','e');return;}
  if(fk==='rel'){relSetItemStatus(id,iid,acao);return;}
  var agora=new Date().toISOString();
  if(fk==='dv'){
    var d=dvById(id);if(!d){toast('Não encontrado','e');return;}
    if(acao==='tratado'){d.status='resolvido';d.data_resolucao=agora;}
    else{d.status='pendente';d.data_resolucao=null;}
    d._dirty=true;d.atualizado_em=agora;save();if(typeof dvAgendarSync==='function')dvAgendarSync();
  } else if(fk==='nc'){
    var n=rsNcById(id);if(!n){toast('Não encontrado','e');return;}
    if(acao==='tratado'){n.status='corrigida';n.data_resolucao=agora;}
    else{n.status='aberta';n.data_resolucao=null;}
    n._dirty=true;n.atualizadoEm=Date.now();save();if(typeof rondaAgendarSync==='function')rondaAgendarSync();
  } else {
    toast('Abra a vistoria para editar os itens','i');relVer(id);return;
  }
  toast(acao==='tratado'?'✅ Marcado como tratado':'⏳ Reaberto como pendente','s');
  render();
}
function cdStatBadge(st){
  var m={tratado:{l:'Tratado',c:'#16a34a'},pendente:{l:'Pendente',c:'#d97706'},vencido:{l:'Vencido',c:'#dc2626'}};
  var x=m[st]||m.pendente;
  return '<span class="badge" style="background:'+x.c+'22;color:'+x.c+'">'+x.l+'</span>';
}
function cdListaView(){
  var info=CD_CAT_INFO[CD_CAT]||CD_CAT_INFO.total;
  var arr=cdFiltrarCat(cdOcorrencias(),CD_CAT);
  // ordena: vencido > pendente > tratado, depois data desc
  var ord={vencido:0,pendente:1,tratado:2};
  arr.sort(function(a,b){var d=(ord[a.status]||9)-(ord[b.status]||9);if(d)return d;return (''+(b.dataReg||'')).localeCompare(''+(a.dataReg||''));});

  var out='<button class="back-btn" onclick="voltar()">← Dashboard</button><div class="rm">';
  out+='<div class="xb-h"><div><div class="xb-title" style="color:'+info.c+'">'+info.ic+' '+info.l+'</div>'
    +'<div class="xb-sub">'+arr.length+' registro(s)'+(CD_EMP?(' · '+rsEsc(CD_EMP)):'')+'</div></div></div>';

  // filtro por empresa
  var emps=cdEmpresas();
  if(emps.length){
    out+='<div class="iw" style="margin:0 0 10px"><label style="font-size:11px;color:#5b6b62">Empresa</label>'
      +'<select class="inp" onchange="cdSetEmp(this.value);render()"><option value="">Todas as empresas</option>'
      +emps.map(function(e){return '<option value="'+rsEsc(e)+'"'+(CD_EMP===e?' selected':'')+'>'+rsEsc(e)+'</option>';}).join('')+'</select></div>';
  }

  if(!arr.length){out+='<div class="xb-card" style="text-align:center;color:#7a8a80;padding:24px">Nenhum registro nesta categoria.</div></div>';return out;}

  out+=arr.map(function(o){
    var nv=rsNivel(o.nivel);
    var thumb=o.foto
      ? '<img class="rm-thumb" src="'+o.foto+'" onclick="cdLightbox(\''+(''+o.foto).replace(/'/g,"\\'")+'\')">'
      : '<div class="rm-no">📷</div>';
    var acoes='';
    if(ehGestor()){
      var ia=(o.iid!=null?o.iid:'null');
      if(o.status!=='tratado')acoes+='<button class="btn btn-g btn-xs" onclick="cdMarcar(\''+o.fk+'\',\''+o.id+'\',\'tratado\','+ia+')">✅ Tratado</button>';
      else acoes+='<button class="btn btn-o btn-xs" onclick="cdMarcar(\''+o.fk+'\',\''+o.id+'\',\'pendente\','+ia+')">⏳ Reabrir</button>';
    }
    acoes+='<button class="btn btn-o btn-xs" onclick="rmAbrir(\''+o.fk+'\',\''+o.id+'\')">🔍 Abrir</button>';
    return '<div class="rm-item" style="cursor:default">'
      +thumb
      +'<div style="flex:1;min-width:0">'
      +'<div style="display:flex;justify-content:space-between;gap:6px;align-items:center"><div style="font-size:11.5px;font-weight:800;color:#0b3d2e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+rsEsc(o.empresa)+'</div>'+cdStatBadge(o.status)+'</div>'
      +'<div style="font-size:12px;color:#33433b;line-height:1.35;margin:3px 0">'+rsEsc(o.descricao||'(sem descrição)')+'</div>'
      +'<div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:6px">'
      +'<span style="font-size:9px;font-weight:700;background:'+nv.c+'22;color:'+nv.c+';padding:1px 6px;border-radius:10px">'+nv.l+'</span>'
      +'<span style="font-size:9.5px;color:#7a8a80">'+o.tipoLabel+'</span>'
      +'<span style="font-size:9.5px;color:#7a8a80">· '+o.fonte+'</span>'
      +(o.prazo?'<span style="font-size:9.5px;color:#7a8a80">⏱ '+fd(o.prazo)+'</span>':'')
      +(o.reinc?'<span style="font-size:9.5px;color:#dc2626">↻ reincid.</span>':'')
      +'</div>'
      +'<div style="display:flex;gap:6px;flex-wrap:wrap">'+acoes+'</div>'
      +'</div></div>';
  }).join('');
  out+='</div>';
  return out;
}

</script>
